<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- EDIT: page title -->
<title>Wolf</title>
<meta name="description" content="Contact card for Wolf." />

<style>
  /* ==========================================================================
     DESIGN TOKENS — change these to adjust the whole look in one place.
     Colors automatically switch for dark mode via the second :root block below.
     ========================================================================== */
  :root {
    --bg:             #F5F5F7;   /* page background (Apple's signature off-white) */
    --surface:        #FFFFFF;  /* the card itself */
    --text:           #1D1D1F;  /* primary text */
    --text-secondary: #6E6E73;  /* tagline, secondary labels */
    --accent:         #0071E3;  /* Apple's current link/button blue */
    --divider:        rgba(0, 0, 0, 0.08);
    --avatar-bg:      #E8E8ED;
    --avatar-icon:    #AEAEB2;
    --shadow:         0 24px 60px rgba(0, 0, 0, 0.08), 0 2px 8px rgba(0, 0, 0, 0.04);
    --radius-card:    22px;
    --radius-row:     14px;
  }

  /* Automatically follow the visitor's system theme — no toggle/JS needed */
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:             #000000;
      --surface:        #1C1C1E;
      --text:           #F5F5F7;
      --text-secondary: #98989D;
      --accent:         #409CFF;
      --divider:        rgba(255, 255, 255, 0.12);
      --avatar-bg:      #2C2C2E;
      --avatar-icon:    #6E6E73;
      --shadow:         none; /* shadows don't read well on black; a hairline border stands in below */
    }
  }

  /* ---- Reset / base ---- */
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: var(--bg);
    /* The system font stack: resolves to San Francisco on Apple devices,
       Segoe UI on Windows, Roboto on Android — the honest cross-platform
       way to get an "Apple-like" type feel without a licensed font file. */
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI",
                 Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
  }

  ::selection { background: var(--accent); color: #fff; }

  :focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  /* ---- The card ---- */
  .card {
    width: 100%;
    max-width: 400px;
    background: var(--surface);
    border-radius: var(--radius-card);
    box-shadow: var(--shadow);
    border: 1px solid var(--divider); /* visible mainly in dark mode; subtle in light mode too */
    overflow: hidden;
  }

  /* ---- Header: avatar, name, tagline ---- */
  .header {
    text-align: center;
    padding: 40px 28px 28px;
  }

  .avatar {
    width: 96px;
    height: 96px;
    margin: 0 auto 18px;
    border-radius: 50%;
    overflow: hidden;
    background: var(--avatar-bg);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* If you add a real photo, this <img> replaces the placeholder below it visually
     (the placeholder only shows when no image is present, see HTML comment). */
  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .name {
    font-size: 1.5rem;       /* 24px */
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0;
  }

  .tagline {
    font-size: 0.95rem;
    color: var(--text-secondary);
    margin: 6px 0 0;
  }

  /* ---- Contact list: iOS "Settings app" grouped-row style ---- */
  .contact-list {
    border-top: 1px solid var(--divider);
  }

  .contact-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 13px 24px;
    min-height: 44px;           /* Apple's Human Interface Guidelines minimum tap target */
    text-decoration: none;
    color: var(--text);
    border-bottom: 1px solid var(--divider);
    /* A subtle, near-instant feedback on tap/hover — functional, not decorative motion.
       Delete the `transition` line entirely if you want literally zero motion. */
    transition: background-color 0.12s ease;
  }
  .contact-row:last-child { border-bottom: none; }
  .contact-row:hover,
  .contact-row:active { background-color: var(--bg); }

  .contact-row__icon {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .contact-row__icon svg { width: 100%; height: 100%; }

  .contact-row__label {
    flex: 1;
    font-size: 1rem;
    font-weight: 400;
  }
  .contact-row__sub {
    font-size: 0.85rem;
    color: var(--text-secondary);
    display: block;
    margin-top: 1px;
  }

  .contact-row__chevron {
    flex-shrink: 0;
    width: 16px;
    height: 16px;
    color: var(--text-secondary);
    opacity: 0.6;
  }

  /* ---- Optional footer line ---- */
  .footer-note {
    text-align: center;
    font-size: 0.8rem;
    color: var(--text-secondary);
    margin-top: 18px;
  }

  /* ---- Mobile ---- */
  @media (max-width: 380px) {
    .header { padding: 32px 20px 24px; }
    .contact-row { padding: 13px 18px; }
  }

  /* Respect reduced-motion preference even for the minimal hover feedback above */
  @media (prefers-reduced-motion: reduce) {
    .contact-row { transition: none; }
  }
</style>
</head>
<body>

  <main>
    <div class="card">

      <!-- ====================== HEADER ====================== -->
      <div class="header">

        <!-- AVATAR
             Option A (default below): a generic placeholder icon — looks
             intentional, not broken, until you add a real photo.
             Option B: replace the whole <div class="avatar">...</div> block
             with:  <div class="avatar"><img src="assets/avatar.jpg" alt="Wolf" /></div>
             Drop your photo at assets/avatar.jpg first (square photo works best,
             it gets cropped to a circle automatically). -->
        <div class="avatar"><img src="assets/avatar.png" alt="Wolf" /></div>

        <!-- EDIT: your name -->
        <h1 class="name">Wolf</h1>
        <!-- EDIT: a one-line tagline — role, field, or focus -->
        <p class="tagline">I eat kids</p>
      </div>

      <!-- ====================== CONTACT LIST ====================== -->
      <nav class="contact-list">

        <!-- EDIT: replace with your real email -->
        <a class="contact-row" href="mailto:you@example.com">
          <span class="contact-row__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
              <rect x="3" y="5" width="18" height="14" rx="2.5"/>
              <path d="M4 7l8 6 8-6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="contact-row__label">
            Email
            <span class="contact-row__sub">you@example.com</span>
          </span>
          <span class="contact-row__chevron" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 18l6-6-6-6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </a>

        <!-- EDIT: replace with your real LinkedIn URL -->
        <a class="contact-row" href="https://linkedin.com/in/yourhandle" target="_blank" rel="noopener">
          <span class="contact-row__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
              <rect x="3" y="3" width="18" height="18" rx="3"/>
              <path d="M8 10v6M8 7.5v.01M12 16v-3.5c0-1.4 1-2.5 2.5-2.5S17 11.1 17 12.5V16" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="contact-row__label">
            LinkedIn
            <span class="contact-row__sub">/in/yourhandle</span>
          </span>
          <span class="contact-row__chevron" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 18l6-6-6-6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </a>

        <!-- EDIT: replace with your real GitHub URL -->
        <a class="contact-row" href="https://github.com/yourhandle" target="_blank" rel="noopener">
          <span class="contact-row__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
              <path d="M12 3a9 9 0 0 0-2.85 17.54c.45.08.62-.2.62-.43v-1.7c-2.5.27-3.15-.6-3.35-1.15-.11-.29-.6-1.15-1.02-1.39-.35-.19-.85-.65-.01-.66.79-.01 1.35.72 1.54 1.02.9 1.5 2.34 1.08 2.91.82.09-.64.35-1.08.64-1.33-2.23-.25-4.56-1.11-4.56-4.94 0-1.09.39-1.99 1.03-2.69-.1-.25-.45-1.27.1-2.64 0 0 .84-.27 2.75 1.02a9.4 9.4 0 0 1 5 0c1.91-1.3 2.75-1.02 2.75-1.02.55 1.37.2 2.39.1 2.64.64.7 1.03 1.59 1.03 2.69 0 3.84-2.34 4.69-4.58 4.94.37.32.68.93.68 1.88v2.04c0 .23.17.5.62.43A9 9 0 0 0 12 3z" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="contact-row__label">
            GitHub
            <span class="contact-row__sub">@yourhandle</span>
          </span>
          <span class="contact-row__chevron" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 18l6-6-6-6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </a>

        <!-- EDIT: replace with your real Google Scholar profile URL -->
        <a class="contact-row" href="https://scholar.google.com/citations?user=yourid" target="_blank" rel="noopener">
          <span class="contact-row__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
              <path d="M12 4L2 9l10 5 8-4.3V15" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M6 11.5V16c0 1.5 2.7 3 6 3s6-1.5 6-3v-4.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="contact-row__label">
            Google Scholar
            <span class="contact-row__sub">Publications &amp; citations</span>
          </span>
          <span class="contact-row__chevron" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 18l6-6-6-6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </a>

      </nav>

    </div>

    <!-- Optional small line below the card. Delete this <p> if you don't want it. -->
    <!-- <p class="footer-note">Based in Your City</p> -->
  </main>

</body>
</html>
